version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NETMAP_DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/netmap
      - NETMAP_SECRET_KEY=${SECRET_KEY:-change-me}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: netmap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
